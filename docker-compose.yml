services:
  mastra:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mastra
    restart: unless-stopped
    ports:
      - "4111:4111"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=production
      # Override localhost → host.docker.internal so the container can reach
      # Supabase services running on the host (127.0.0.1 resolves to the container inside Docker)
      - SUPABASE_URL=http://host.docker.internal:54321
      - SUPABASE_DB_URL=postgresql://postgres:postgres@host.docker.internal:54322/postgres
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4111/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
